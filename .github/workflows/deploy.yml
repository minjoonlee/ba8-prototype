name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image
        run: docker build -t harbor.witchwitch.io/witchwitch/ba8-web:prod .
      
      - name: Login to Harbor
        uses: docker/login-action@v2
        with:
          registry: harbor.witchwitch.io
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      
      - name: Push image
        run: docker push harbor.witchwitch.io/witchwitch/ba8-web:prod
      
      - name: Deploy to EKS
        run: |
          # kubectl apply 등
          echo "Deploy to EKS"
